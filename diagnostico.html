<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Firebase v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0f1e; color:#f1f5f9; font-family:monospace; padding:16px; font-size:13px; }
h1 { font-size:16px; margin-bottom:16px; color:#f97316; }
.log { background:#111827; border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px; margin-bottom:10px; line-height:1.9; min-height:200px; }
.ok   { color:#10b981; }
.err  { color:#f43f5e; }
.warn { color:#f97316; }
.info { color:#94a3b8; }
button { background:#f97316; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; font-size:13px; cursor:pointer; margin-top:10px; margin-right:8px; }
</style>
</head>
<body>
<h1>🔍 Diagnóstico Firebase v2</h1>
<div class="log" id="log"></div>
<button onclick="window.location.reload()">🔄 Repetir teste</button>
<button onclick="window.location.href='index.html'">← Login</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const logEl = document.getElementById('log');

function log(msg, cls='info') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = '› ' + msg;
  logEl.appendChild(d);
}

let db, auth;
try {
  firebase.initializeApp({
    apiKey: "AIzaSyDrFZ5LDIulhQlsurXs0GWP4QvJ6O2rq4A",
    authDomain: "meu-26dbf.firebaseapp.com",
    projectId: "meu-26dbf",
    storageBucket: "meu-26dbf.firebasestorage.app",
    messagingSenderId: "561029322629",
    appId: "1:561029322629:web:7dda91ab2ff7aec60596ec"
  });
  db = firebase.firestore();
  auth = firebase.auth();

  // Força long polling — contorna bloqueios de WebSocket
  db.settings({ experimentalForceLongPolling: true, merge: true });

  log('✓ Firebase inicializado', 'ok');
  log('ℹ Long polling ativado', 'warn');
} catch(e) {
  log('✗ Erro init: ' + e.message, 'err');
}

auth.onAuthStateChanged(async user => {
  if (!user) {
    log('✗ Sem utilizador autenticado — faz login primeiro', 'err');
    return;
  }

  log('✓ Auth OK: ' + user.email, 'ok');
  log('  UID: ' + user.uid, 'info');

  const uid = user.uid;

  // Timeout manual de 12 segundos
  let done = false;
  const timer = setTimeout(() => {
    if (!done) {
      done = true;
      log('', 'info');
      log('✗ TIMEOUT — Firestore não respondeu em 12 segundos', 'err');
      log('━━━━━━━━━━━━━━━━━━━━━', 'info');
      log('DIAGNÓSTICO DO TIMEOUT:', 'warn');
      log('Mesmo com long polling, sem resposta.', 'warn');
      log('Isto indica que o projeto Firebase pode estar:', 'warn');
      log('  1. Com a API do Firestore desativada', 'warn');
      log('  2. Com billing suspenso no Google Cloud', 'warn');
      log('  3. Com restrições de API key', 'warn');
      log('', 'info');
      log('→ Vai a: console.cloud.google.com', 'ok');
      log('→ Projeto: meu-26dbf', 'ok');
      log('→ APIs e Serviços → Biblioteca', 'ok');
      log('→ Procura "Cloud Firestore API"', 'ok');
      log('→ Verifica se está ATIVADA', 'ok');
      testarHTTP(uid);
    }
  }, 12000);

  log('⏳ A escrever no Firestore (aguarda até 12s)...', 'info');

  try {
    const ref = await db.collection('usuarios').doc(uid).collection('vendas').add({
      _teste: true,
      valor: 0,
      data: new Date().toISOString()
    });

    if (done) return;
    done = true;
    clearTimeout(timer);

    log('✓ ESCRITA OK! ID: ' + ref.id, 'ok');

    const snap = await db.collection('usuarios').doc(uid).collection('vendas').get();
    log('✓ LEITURA OK — ' + snap.size + ' doc(s)', 'ok');

    await ref.delete();
    log('✓ Limpeza OK', 'ok');

    const perf = await db.collection('usuarios').doc(uid).get();
    log(perf.exists ? '✓ Perfil existe' : 'ℹ Perfil ainda não criado (normal)', perf.exists ? 'ok' : 'warn');

    log('━━━━━━━━━━━━━━━━━━━━━', 'info');
    log('✅ FIRESTORE FUNCIONA! Problema está no tttt.html', 'ok');
    log('Faz upload do app.html corrigido e renomeia para tttt.html', 'warn');

  } catch(e) {
    if (done) return;
    done = true;
    clearTimeout(timer);
    log('✗ ERRO: ' + e.code, 'err');
    log('  ' + e.message, 'err');
    testarHTTP(uid);
  }
});

async function testarHTTP(uid) {
  log('━━━━━━━━━━━━━━━━━━━━━', 'info');
  log('⏳ A testar HTTP para firestore.googleapis.com...', 'info');
  try {
    const r = await fetch('https://firestore.googleapis.com/v1/projects/meu-26dbf/databases/(default)/documents/usuarios/' + uid);
    log('✓ HTTP responde — status: ' + r.status, 'ok');
    if (r.status === 401 || r.status === 403) {
      log('  Status ' + r.status + ' = normal (sem token), MAS rede funciona!', 'ok');
      log('  → O Firestore está acessível pela rede', 'ok');
      log('  → O problema é provavelmente a API Key restrita', 'warn');
      log('  → Vai ao Firebase Console → Configurações → API Key', 'warn');
      log('  → Remove restrições de domínio da API key', 'warn');
    } else if (r.status === 200) {
      log('  Documento encontrado via HTTP direto', 'ok');
    }
  } catch(e) {
    log('✗ HTTP falhou: ' + e.message, 'err');
    log('  → Problema de rede ou CORS', 'err');
  }
}
</script>
</body>
</html>
