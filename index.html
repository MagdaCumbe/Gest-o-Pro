<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão Pro - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --accent: #f97316;
  --green: #10b981;
  --red: #f43f5e;
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1a2234;
  --border: rgba(255,255,255,0.07);
  --text: #f1f5f9;
  --muted: #64748b;
  --muted2: #94a3b8;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; left: -150px;
  width: 550px; height: 550px;
  background: radial-gradient(circle, rgba(249,115,22,0.1) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -150px; right: -150px;
  width: 450px; height: 450px;
  background: radial-gradient(circle, rgba(59,130,246,0.07) 0%, transparent 70%);
  pointer-events: none;
}

.card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px 36px;
  position: relative;
  overflow: hidden;
  animation: fadeUp 0.35s ease;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(249,115,22,0.5), transparent);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}
.logo-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), #f43f5e);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  color: white;
  box-shadow: 0 0 28px rgba(249,115,22,0.35);
}
.logo-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.4px;
}
.logo-title span { color: var(--accent); }
.logo-sub {
  font-size: 12px;
  color: var(--muted);
  text-align: center;
  margin-top: -4px;
}

.screen-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 22px;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.screen-title i { color: var(--accent); font-size: 16px; }

.form-group { margin-bottom: 14px; }
.form-group label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted2);
  margin-bottom: 6px;
  display: block;
}
.input-wrap { position: relative; }
.input-wrap i.field-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 13px;
  pointer-events: none;
}
.input-wrap i.eye-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s;
}
.input-wrap i.eye-icon:hover { color: var(--accent); }
input {
  width: 100%;
  padding: 13px 16px 13px 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input::placeholder { color: var(--muted); }
input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
  background: #1e2a3a;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ea580c);
  color: white;
  box-shadow: 0 4px 18px rgba(249,115,22,0.35);
}
.btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(249,115,22,0.45); }
.btn-primary:active:not(:disabled) { transform: translateY(0); }

.links {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--muted);
  line-height: 2;
}
.links a {
  color: var(--accent);
  cursor: pointer;
  font-weight: 600;
  text-decoration: none;
  transition: opacity 0.2s;
}
.links a:hover { opacity: 0.8; }
.links .sep { color: var(--border); margin: 0 6px; }

#toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 22px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.success { border-color: rgba(16,185,129,0.4); color: var(--green); }
#toast.error { border-color: rgba(244,63,94,0.4); color: var(--red); }

.hidden { display: none !important; }

/* Loading spinner no botão */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">GP</div>
    <div class="logo-title">Gestão <span>Pro</span></div>
    <p class="logo-sub">Controle total do seu negócio</p>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <div class="screen-title"><i class="fa fa-lock"></i> Entrar na conta</div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <i class="fa fa-envelope field-icon"></i>
        <input type="email" id="emailLogin" placeholder="seu@email.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label>Senha</label>
      <div class="input-wrap">
        <i class="fa fa-key field-icon"></i>
        <input type="password" id="senhaLogin" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') fazerLogin()">
        <i class="fa fa-eye eye-icon" onclick="toggleSenha('senhaLogin', this)"></i>
      </div>
    </div>

    <button class="btn btn-primary" id="btnLogin" onclick="fazerLogin()">
      <i class="fa fa-arrow-right-to-bracket"></i> Entrar
    </button>

    <div class="links">
      <a onclick="mostrarCadastro()">Criar conta</a>
      <span class="sep">|</span>
      <a onclick="mostrarRecuperar()">Esqueceu a senha?</a>
    </div>
  </div>

  <!-- CADASTRO -->
  <div id="cadastroForm" class="hidden">
    <div class="screen-title"><i class="fa fa-user-plus"></i> Criar conta</div>

    <div class="form-group">
      <label>Nome</label>
      <div class="input-wrap">
        <i class="fa fa-user field-icon"></i>
        <input type="text" id="nomeCadastro" placeholder="Seu nome completo" autocomplete="name">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <i class="fa fa-envelope field-icon"></i>
        <input type="email" id="emailCadastro" placeholder="seu@email.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label>Senha</label>
      <div class="input-wrap">
        <i class="fa fa-key field-icon"></i>
        <input type="password" id="senhaCadastro" placeholder="Mínimo 6 caracteres" autocomplete="new-password"
          onkeydown="if(event.key==='Enter') criarConta()">
        <i class="fa fa-eye eye-icon" onclick="toggleSenha('senhaCadastro', this)"></i>
      </div>
    </div>

    <button class="btn btn-primary" id="btnCadastro" onclick="criarConta()">
      <i class="fa fa-check"></i> Criar Conta
    </button>

    <div class="links">
      <a onclick="mostrarLogin()">← Já tenho conta</a>
    </div>
  </div>

  <!-- RECUPERAR -->
  <div id="recuperarForm" class="hidden">
    <div class="screen-title"><i class="fa fa-unlock-keyhole"></i> Recuperar senha</div>

    <p style="font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6;">
      Insira o seu email e enviaremos um link para redefinir a senha.
    </p>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <i class="fa fa-envelope field-icon"></i>
        <input type="email" id="emailRecuperar" placeholder="seu@email.com"
          onkeydown="if(event.key==='Enter') recuperarSenha()">
      </div>
    </div>

    <button class="btn btn-primary" id="btnRecuperar" onclick="recuperarSenha()">
      <i class="fa fa-paper-plane"></i> Enviar Link
    </button>

    <div class="links">
      <a onclick="mostrarLogin()">← Voltar ao login</a>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK 9.23.0 compat (MESMA versão do app.html) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDrFZ5LDIulhQlsurXs0GWP4QvJ6O2rq4A",
  authDomain: "meu-26dbf.firebaseapp.com",
  projectId: "meu-26dbf",
  storageBucket: "meu-26dbf.firebasestorage.app",
  messagingSenderId: "561029322629",
  appId: "1:561029322629:web:7dda91ab2ff7aec60596ec"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Redireciona se já estiver logado
auth.onAuthStateChanged(user => {
  if (user) window.location.href = "tttt.html";
});

// ===== TOAST =====
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => { t.className = ''; }, 3200);
}

// ===== LOADING BUTTON =====
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> A processar...';
  } else {
    btn.disabled = false;
  }
}

// ===== NAVEGAÇÃO =====
function mostrarLogin() { esconderTudo(); document.getElementById("loginForm").classList.remove("hidden"); }
function mostrarCadastro() { esconderTudo(); document.getElementById("cadastroForm").classList.remove("hidden"); }
function mostrarRecuperar() { esconderTudo(); document.getElementById("recuperarForm").classList.remove("hidden"); }
function esconderTudo() {
  ["loginForm", "cadastroForm", "recuperarForm"].forEach(id => document.getElementById(id).classList.add("hidden"));
}

// ===== TOGGLE SENHA =====
function toggleSenha(id, icon) {
  const input = document.getElementById(id);
  const isHidden = input.type === "password";
  input.type = isHidden ? "text" : "password";
  icon.classList.toggle("fa-eye", !isHidden);
  icon.classList.toggle("fa-eye-slash", isHidden);
}

// ===== MENSAGENS DE ERRO PT =====
function traduzirErro(code) {
  const erros = {
    "auth/user-not-found": "Email não encontrado.",
    "auth/wrong-password": "Senha incorreta.",
    "auth/invalid-email": "Email inválido.",
    "auth/email-already-in-use": "Este email já está em uso.",
    "auth/weak-password": "A senha deve ter pelo menos 6 caracteres.",
    "auth/too-many-requests": "Muitas tentativas. Tente novamente mais tarde.",
    "auth/invalid-credential": "Email ou senha inválidos.",
    "auth/network-request-failed": "Erro de conexão. Verifique a internet."
  };
  return erros[code] || "Erro inesperado. Tente novamente.";
}

// ===== CADASTRO =====
function criarConta() {
  const nome = document.getElementById("nomeCadastro").value.trim();
  const email = document.getElementById("emailCadastro").value.trim();
  const senha = document.getElementById("senhaCadastro").value;
  if (!nome || !email || !senha) { showToast("Preencha todos os campos", "error"); return; }
  if (senha.length < 6) { showToast("A senha deve ter pelo menos 6 caracteres", "error"); return; }

  setLoading("btnCadastro", true);
  auth.createUserWithEmailAndPassword(email, senha)
    .then(cred => {
      // Salva o nome do utilizador no Firestore
      return firebase.firestore().collection("usuarios").doc(cred.user.uid).set({
        perfil: { nome, negocio: "Meu Negócio", email }
      });
    })
    .then(() => {
      showToast("✓ Conta criada! A entrar...");
      setTimeout(() => { window.location.href = "app.html"; }, 1200);
    })
    .catch(err => {
      setLoading("btnCadastro", false);
      document.getElementById("btnCadastro").innerHTML = '<i class="fa fa-check"></i> Criar Conta';
      showToast(traduzirErro(err.code), "error");
    });
}

// ===== LOGIN =====
function fazerLogin() {
  const email = document.getElementById("emailLogin").value.trim();
  const senha = document.getElementById("senhaLogin").value;
  if (!email || !senha) { showToast("Preencha todos os campos", "error"); return; }

  setLoading("btnLogin", true);
  auth.signInWithEmailAndPassword(email, senha)
    .then(() => { window.location.href = "app.html"; })
    .catch(err => {
      setLoading("btnLogin", false);
      document.getElementById("btnLogin").innerHTML = '<i class="fa fa-arrow-right-to-bracket"></i> Entrar';
      showToast(traduzirErro(err.code), "error");
    });
}

// ===== RECUPERAR SENHA =====
function recuperarSenha() {
  const email = document.getElementById("emailRecuperar").value.trim();
  if (!email) { showToast("Digite o seu email", "error"); return; }

  setLoading("btnRecuperar", true);
  auth.sendPasswordResetEmail(email)
    .then(() => {
      showToast("✓ Link enviado para o seu email!");
      setTimeout(mostrarLogin, 2200);
    })
    .catch(err => {
      setLoading("btnRecuperar", false);
      document.getElementById("btnRecuperar").innerHTML = '<i class="fa fa-paper-plane"></i> Enviar Link';
      showToast(traduzirErro(err.code), "error");
    });
}
</script>
</body>
</html>
